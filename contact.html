<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me - Gohar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="navbar">
    <nav>
      <a href="index.html">Home</a>
      <a href="resume.html">Resume</a>
      <a href="projects.html">Projects</a>
      
    </nav>
  </header>

  <main class="contact-wrapper">
    <h1>Contact <span>Me</span></h1>
    <p class="subtitle">Get in touch with me</p>

    <form form id="contact-form" action="https://formspree.io/f/xanoqvyg" method="POST" class="contact-form">
      <div class="form-group">
        <input type="text" name="first" placeholder="First Name" required />
        <input type="text" name="last" placeholder="Last Name" required />
      </div>
      <input type="email" name="email" placeholder="Email" required />
      <input type="text" name="subject" placeholder="Subject" required />
      <textarea name="message" rows="5" placeholder="Your Message..." required></textarea>
      <button type="submit" class="btn-submit">Send Message</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Gohar Khosrupanah</p>
  </footer>
  <script>
    document.getElementById("contact-form").addEventListener("submit", function (e) {
      e.preventDefault(); // Stop default form action first
  
      const form = e.target;
  
      // Send the form using Fetch
      fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        headers: {
          'Accept': 'application/json'
        }
      }).then(response => {
        if (response.ok) {
          alert("Your message has been sent! 😊");
          form.reset();
        } else {
          alert("Oops! Something went wrong. Please try again.");
        }
      }).catch(error => {
        alert("Error: Unable to send message.");
      });
    });
  </script>
  
</body>
</html>
